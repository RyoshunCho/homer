<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Phone Number Formatter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        :root {
            --bg-color: #ffffff;
            --text-color: #202124;
            --subtext-color: #5f6368;
            --border-color: #dadce0;
            --primary-color: #1a73e8;
            --success-color: #1e8e3e;
            --error-color: #d93025;
            --hover-bg: #f8f9fa;
            --input-bg: #f1f3f4;
            --card-bg: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #2d3748;
                --text-color: #e8eaed;
                --subtext-color: #9aa0a6;
                --border-color: #5f6368;
                --primary-color: #8ab4f8;
                --success-color: #81c995;
                --error-color: #f28b82;
                --hover-bg: #3c4043;
                --input-bg: #1f2733;
                --card-bg: #2d3748;
            }
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: transparent;
            overflow-y: auto;
            /* Allow vertical scrolling */
        }

        .widget-wrapper {
            min-height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            /* Changed from center to avoid clipping when scrolling */
            padding: 20px;
            box-sizing: border-box;
        }

        .widget-header {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 10px;
            padding-left: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .widget-header-link {
            width: 22px;
            height: 22px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            font-size: 0.75rem;
            text-decoration: none;
            transition: all 260ms cubic-bezier(0.16, 1, 0.3, 1);
        }

        .widget-header-link:hover {
            background: var(--card-bg);
            border-color: var(--primary-color);
            transform: translateY(-1px);
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .phone-input {
            flex: 1;
            min-width: 0;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 1rem;
            color: var(--text-color);
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        .phone-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }

        .action-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .action-btn:hover {
            opacity: 0.9;
        }

        .result-card {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            display: none;
            /* Hidden by default */
            flex-direction: column;
            gap: 8px;
        }

        .result-card.visible {
            display: flex;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .label {
            color: var(--subtext-color);
        }

        .value {
            font-weight: 600;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .flag-icon {
            width: 20px;
            height: 15px;
            border-radius: 2px;
            object-fit: cover;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        .status-valid {
            background: rgba(30, 142, 62, 0.1);
            color: var(--success-color);
        }

        .status-invalid {
            background: rgba(217, 48, 37, 0.1);
            color: var(--error-color);
        }

        .formatted-number {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--text-color);
        }
    </style>
</head>

<body>
    <div class="widget-wrapper">
        <div class="widget-header">
            <span>Phone No. Formatter</span>
            <a
                class="widget-header-link"
                href="https://phone-api.lodgegeek.com/swagger"
                target="_blank"
                rel="noopener noreferrer"
                title="Open Phone API docs"
                aria-label="Open Phone API docs"
            >
                <i class="fas fa-arrow-up-right-from-square" aria-hidden="true"></i>
            </a>
        </div>

        <div class="input-group">
            <input type="tel" id="phone-input" class="phone-input" placeholder="+1 555 0123" autocomplete="tel">
            <button id="format-btn" class="action-btn">Check</button>
        </div>

        <div id="result-card" class="result-card">
            <div id="formatted-display" class="formatted-number"></div>

            <div class="result-row">
                <span class="label">Country</span>
                <div class="value">
                    <img id="country-flag" class="flag-icon" src="" alt="">
                    <span id="country-name"></span>
                </div>
            </div>

            <div class="result-row" id="region-row" style="display:none;">
                <span class="label">Location</span>
                <span id="region-value" class="value"></span>
            </div>

            <div class="result-row">
                <span class="label">Primary Language</span>
                <span id="language-name" class="value"></span>
            </div>

            <div class="result-row">
                <span class="label">Type</span>
                <span id="number-type" class="value"></span>
            </div>

            <div class="result-row">
                <span class="label">Local Format</span>
                <span id="local-format" class="value"></span>
            </div>
        </div>
    </div>
    <script>
        const PHONE_API_BASE_URL = 'https://phone-api.lodgegeek.com';
        const PRIORITY_COUNTRIES = ['JP', 'CN', 'HK', 'TW', 'KR', 'US'];
        const $ = id => document.getElementById(id);
        const phoneInput = $('phone-input');
        const formatBtn = $('format-btn');
        const resultCard = $('result-card');

        let candidates = [];
        let currentCandidateIndex = 0;

        async function formatPhoneNumber() {
            const raw = phoneInput.value.trim();
            if (!raw) {
                hideResult();
                return;
            }

            formatBtn.disabled = true;
            candidates = [];
            currentCandidateIndex = 0;

            try {
                const response = await fetch(`${PHONE_API_BASE_URL}/v1/format`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone: raw,
                        defaultCountries: PRIORITY_COUNTRIES,
                        locale: 'en'
                    })
                });
                const body = await response.json().catch(() => ({}));
                if (!response.ok || body.ok === false) {
                    throw new Error(body.error?.message || 'Phone lookup failed');
                }

                candidates = Array.isArray(body.candidates) ? body.candidates : [];
                if (candidates.length === 0) {
                    showRawInfo('No valid phone number found');
                    return;
                }
                renderCurrentCandidate(raw);
            } catch (error) {
                console.error(error);
                showRawInfo('Phone lookup failed');
            } finally {
                formatBtn.disabled = false;
            }
        }

        function renderCurrentCandidate(raw) {
            const candidate = candidates[currentCandidateIndex];
            if (!candidate) {
                showRawInfo(raw);
                return;
            }
            displayResult(candidate, raw);
        }

        function displayResult(candidate, rawInput) {
            try {
                const country = candidate.country;
                $('formatted-display').textContent = candidate.international || candidate.e164 || rawInput;
                $('local-format').textContent = candidate.national || '-';

                if (country) {
                    $('country-flag').src = `https://flagcdn.com/w40/${country.toLowerCase()}.png`;
                    $('country-flag').style.display = 'block';
                    $('country-name').textContent = candidate.countryName || country;
                    $('language-name').textContent = candidate.language || '-';
                } else {
                    $('country-flag').style.display = 'none';
                    $('country-name').textContent = 'Unknown Region';
                    $('language-name').textContent = '-';
                }

                $('number-type').textContent = candidate.typeLabel || 'Unknown';

                const regionRow = $('region-row');
                const regionVal = $('region-value');
                if (candidate.location) {
                    regionVal.textContent = candidate.location;
                    regionRow.style.display = 'flex';
                } else {
                    regionRow.style.display = 'none';
                }

                renderAlternatives();
                resultCard.classList.add('visible');
            } catch (error) {
                console.error(error);
                showRawInfo(rawInput);
            }
        }

        function renderAlternatives() {
            let altContainer = $('alternatives-container');
            if (altContainer) {
                altContainer.innerHTML = '';
            } else {
                altContainer = document.createElement('div');
                altContainer.id = 'alternatives-container';
                altContainer.className = 'result-row';
                altContainer.style.marginTop = '8px';
                altContainer.style.justifyContent = 'flex-start';
                altContainer.style.flexWrap = 'wrap';
                altContainer.style.gap = '8px';
                resultCard.appendChild(altContainer);
            }

            if (candidates.length > 1) {
                const label = document.createElement('span');
                label.className = 'label';
                label.style.width = '100%';
                label.textContent = 'Alternatives:';
                altContainer.appendChild(label);

                candidates.forEach((candidate, idx) => {
                    if (idx === currentCandidateIndex) return;

                    const btn = document.createElement('button');
                    btn.className = 'status-badge';
                    btn.style.cursor = 'pointer';
                    btn.style.border = '1px solid var(--border-color)';
                    btn.style.background = 'var(--bg-color)';
                    btn.style.color = 'var(--text-color)';
                    btn.style.display = 'flex';
                    btn.style.alignItems = 'center';
                    btn.style.gap = '4px';

                    if (candidate.country) {
                        const flag = document.createElement('img');
                        flag.className = 'flag-icon';
                        flag.style.width = '16px';
                        flag.style.height = '12px';
                        flag.src = `https://flagcdn.com/w40/${candidate.country.toLowerCase()}.png`;
                        btn.appendChild(flag);
                    }

                    const text = document.createElement('span');
                    text.textContent = candidate.country || '?';
                    btn.appendChild(text);

                    btn.onclick = () => {
                        currentCandidateIndex = idx;
                        renderCurrentCandidate(phoneInput.value.trim());
                    };

                    altContainer.appendChild(btn);
                });
            }
        }

        function showRawInfo(raw) {
            $('formatted-display').textContent = raw;
            $('local-format').textContent = '-';
            $('country-name').textContent = '-';
            $('language-name').textContent = '-';
            $('number-type').textContent = '-';
            $('country-flag').style.display = 'none';
            const alt = $('alternatives-container');
            if (alt) alt.innerHTML = '';
            const rr = $('region-row');
            if (rr) rr.style.display = 'none';
            resultCard.classList.add('visible');
        }

        function hideResult() {
            resultCard.classList.remove('visible');
        }

        formatBtn.addEventListener('click', formatPhoneNumber);
        phoneInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') formatPhoneNumber();
        });
    </script>
</body>

</html>
